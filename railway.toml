[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --noinput && python create_admin.py && gunicorn informatik22.wsgi --bind 0.0.0.0:$PORT --workers 2 --log-file -"

healthcheckPath = "/login/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
